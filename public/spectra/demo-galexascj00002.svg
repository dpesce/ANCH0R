  <text x="395" y="410" fill="#66736f" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">Velocity</text>
  <text x="38" y="235" fill="#66736f" font-family="Inter, Arial, sans-serif" font-size="13" transform="rotate(-90 38 235)" text-anchor="middle">Flux density</text>
