<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Demo spectrum for GALEXASCJ00002</title>
  <desc id="desc">Synthetic demo 22 GHz spectrum used for ANCH0R interface testing.</desc>
  <rect width="820" height="460" fill="#ffffff"/>
  <text x="54" y="48" fill="#22312d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">GALEXASCJ00002</text>
  <text x="54" y="76" fill="#66736f" font-family="Inter, Arial, sans-serif" font-size="14">DEMO 22 GHz spectrum - GBT</text>
  <line x1="80" y1="370" x2="760" y2="370" stroke="#9aa8a4" stroke-width="1.5"/>
